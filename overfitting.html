<h1>Overfitting</h1>

<div class="section">
<h2>📌 Definition</h2>
<p>Model learns noise instead of pattern.</p>
</div>

<div class="section">
<h2>⚙️ Cause</h2>
<ul>
<li>Complex model</li>
<li>Small data</li>
</ul>
</div>

<div class="section">
<h2>🔢 Example</h2>
<p>Perfect training accuracy but poor test accuracy.</p>
</div>

<div class="section">
<h2>✅ Solution</h2>
<ul>
<li>Regularization</li>
<li>More data</li>
</ul>
</div>

<div class="section">
<h2>🎯 Interview</h2>
<p>How to reduce overfitting?</p>
<p><b>Answer:</b> Regularization</p>
</div>
