<!DOCTYPE html>
<html>
<head>
<title>MLGuide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f8fafc}
nav{padding:15px;background:#4f46e5;color:white}
.container{padding:30px}
.card{background:white;padding:20px;margin:15px 0;border-radius:10px}
button{padding:10px;margin:5px;background:#4f46e5;color:white;border:none;border-radius:5px}
</style>
</head>

<body>

<nav>MLGuide</nav>

<div class="container">

<h2>Start Learning</h2>
<a href="knn.html">KNN</a> |
<a href="logistic.html">Logistic</a> |
<a href="regression.html">Regression</a>

<div class="card">
<h3>🔥 Daily Quiz</h3>
<p id="q"></p>
<button onclick="ans(1)">Option A</button>
<button onclick="ans(0)">Option B</button>
<p id="res"></p>
</div>

<div class="card">
<h3>🏆 Your Stats</h3>
<p>Score: <span id="score"></span></p>
<p>Streak: <span id="streak"></span></p>
<p>Level: <span id="level"></span></p>
</div>

<canvas id="chart"></canvas>

</div>

<script>
let questions=[
{q:"KNN is?",a:1},
{q:"Regression predicts?",a:1},
{q:"Sigmoid range?",a:1}
];

let today=new Date().getDate()%questions.length;
document.getElementById("q").innerText=questions[today].q;

let score=localStorage.getItem("score")||0;
let streak=localStorage.getItem("streak")||0;

document.getElementById("score").innerText=score;
document.getElementById("streak").innerText=streak;
document.getElementById("level").innerText=Math.floor(score/5)+1;

function ans(x){
if(x==questions[today].a){
score++;
streak++;
localStorage.setItem("score",score);
localStorage.setItem("streak",streak);
document.getElementById("res").innerText="Correct 🔥";
}else{
streak=0;
localStorage.setItem("streak",streak);
document.getElementById("res").innerText="Wrong ❌";
}
location.reload();
}

// Graph
new Chart(document.getElementById('chart'),{
type:'line',
data:{labels:[1,2,3],datasets:[{data:[2,4,6]}]}
});
</script>

</body>
</html>
